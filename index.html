<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Juros Compostos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="caixa">
        <header>
            <h1>Calculadora</h1>
        </header>
        <input type="number" placeholder="Investimento Inicial" name="investimento_inicial" id="investimento_inicial" required="">
        <input type="number" placeholder="Investimento Mensal" name="investimento_mensal" id="investimento_mensal" required="">
        <input type="number" placeholder="Tempo (Meses)" name="tempo" id="tempo" required="">
        <input type="number" placeholder="Juros (Mensal)" name="juros" id="juros" required="">
        <button id="open-modal" onclick="calcular()">Calcular</button> 
    </div>

    <div class="modal">
    <div id="fade" class="hide"></div>
    <div id="modal" class="hide">
      <div class="modal-header">
        <h2>Resultado</h2>
        <div id="modal-body" class="modal-body">
            <a1>Valor total final<br><aa1>R$0,00</aa1></a1>
            <a2>Valor total investido<br></aa2>R$0,00</aa2></a2>
            <a3>Valor em juros<br></aa3>R$0,00</aa3></a3>
          </div>
        <button id="close-modal">Fechar</button>
      </div>
      </div>
    </div>
</div>
    <script src="script.js"></script>
</body>
</html>
